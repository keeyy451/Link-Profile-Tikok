<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Melanjutkan ke WhatsApp...</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .redirect-container {
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2.5rem 1.5rem;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            width: 100%;
            max-width: 340px;
        }
        .redirect-container h2 {
            font-size: 1.2rem;
            margin-bottom: 1rem;
            color: #ffffff;
        }
        .redirect-container p {
            font-size: 0.9rem;
            color: #a1a1aa;
            margin-bottom: 2rem;
            line-height: 1.5;
        }
        .btn-wa {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: #25D366;
            color: #000000;
            padding: 1rem 2rem;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.05rem;
            width: 100%;
            transition: transform 0.2s;
        }
        .btn-wa:active {
            transform: scale(0.95);
        }
        .btn-web {
            display: inline-block;
            margin-top: 1.5rem;
            color: #a1a1aa;
            text-decoration: underline;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="redirect-container fade-in-up">
        <h2>Lanjutkan ke WhatsApp</h2>
        <p>Browser TikTok memblokir perpindahan otomatis. Silakan klik tombol di bawah untuk membuka WhatsApp.</p>
        
        <!-- PENTING: MURNI ELEMEN <a> TANPA JAVASCRIPT REDIRECT -->
        <a href="https://api.whatsapp.com/send?phone=62895383583900" target="_blank" rel="noopener noreferrer" class="btn-wa">
            💬 Buka WhatsApp
        </a>

        <!-- FALLBACK WA WEB -->
        <a href="https://web.whatsapp.com/send?phone=62895383583900" target="_blank" rel="noopener noreferrer" class="btn-web">
            Buka versi WhatsApp Web
        </a>
    </div>
</body>
</html>
