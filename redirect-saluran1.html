<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Melanjutkan ke Saluran...</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .redirect-container {
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2.5rem 1.5rem;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            width: 100%;
            max-width: 340px;
        }
        .redirect-container h2 {
            font-size: 1.2rem;
            margin-bottom: 1rem;
            color: #ffffff;
        }
        .redirect-container p {
            font-size: 0.9rem;
            color: #a1a1aa;
            margin-bottom: 2rem;
            line-height: 1.5;
        }
        .tip-box {
            background: rgba(251, 191, 36, 0.1);
            border: 1px solid rgba(251, 191, 36, 0.3);
            color: #fbbf24;
            padding: 0.8rem;
            border-radius: 8px;
            font-size: 0.8rem;
            margin-bottom: 1.5rem;
            text-align: left;
        }
        .btn-wa {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: #25D366;
            color: #000000;
            padding: 1rem 2rem;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.05rem;
            width: 100%;
            transition: transform 0.2s;
        }
        .btn-wa:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div class="redirect-container fade-in-up">
        <h2>Lanjutkan ke Saluran</h2>
        <p>Silakan klik tombol di bawah untuk membuka Saluran WhatsApp.</p>

        <div class="tip-box">
            ⚠️ <strong>Info Penting:</strong> Jika layar putih saat bergabung, ketuk ikon <strong>Tiga Titik (⋯)</strong> di pojok kanan atas browser TikTok ini, lalu pilih <strong>"Buka di Browser Safari/Chrome"</strong>.
        </div>
        
        <a href="https://whatsapp.com/channel/0029Vas91PpJf05hHOVVqJ2D" class="btn-wa">
            📢 Buka Saluran
        </a>
    </div>
</body>
</html>
