<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Melanjutkan ke Saluran...</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .redirect-container {
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2.5rem 1.5rem;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            width: 100%;
            max-width: 340px;
        }
        .redirect-container h2 {
            font-size: 1.2rem;
            margin-bottom: 1rem;
            color: #ffffff;
        }
        .redirect-container p {
            font-size: 0.9rem;
            color: #a1a1aa;
            margin-bottom: 2rem;
            line-height: 1.5;
        }
        .btn-wa {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: #25D366;
            color: #000000;
            padding: 1rem 2rem;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.05rem;
            width: 100%;
            transition: transform 0.2s;
        }
        .btn-wa:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div class="redirect-container fade-in-up">
        <h2>Lanjutkan ke Saluran</h2>
        <p>Browser TikTok memblokir perpindahan otomatis. Silakan klik tombol di bawah untuk membuka Saluran WhatsApp.</p>
        
        <!-- PENTING: MURNI ELEMEN <a> TANPA JAVASCRIPT REDIRECT -->
        <a href="https://whatsapp.com/channel/0029Vas91PpJf05hHOVVqJ2D" target="_blank" rel="noopener noreferrer" class="btn-wa">
            📢 Buka Saluran
        </a>
    </div>
</body>
</html>
